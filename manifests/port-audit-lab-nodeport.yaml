apiVersion: v1
kind: Namespace
metadata:
  name: port-audit-lab
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nodeport-sample
  namespace: port-audit-lab
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nodeport-sample
  template:
    metadata:
      labels:
        app: nodeport-sample
    spec:
      containers:
        - name: http-echo
          image: hashicorp/http-echo:1.0
          args:
            - "-text=port-audit nodeport sample"
            - "-listen=:5678"
          ports:
            - name: http
              containerPort: 5678
---
apiVersion: v1
kind: Service
metadata:
  name: nodeport-sample
  namespace: port-audit-lab
spec:
  type: NodePort
  selector:
    app: nodeport-sample
  ports:
    - name: http
      protocol: TCP
      port: 8080
      targetPort: 5678
      nodePort: 32080
