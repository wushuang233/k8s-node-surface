<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>宿主机暴露端口审计</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <div class="noise"></div>
    <main class="layout">
      <section class="hero panel">
        <div class="hero-copy">
          <p class="eyebrow">宿主机暴露端口审计</p>
          <h1>宿主机暴露端口面板</h1>
          <p class="hero-text">
            只保留宿主机地址上可直接关注的 TCP 暴露端口，并补充 Kubernetes 归因和流量证据。
          </p>
          <div class="hero-tags">
            <span class="badge badge-primary">节点扫描</span>
            <span class="badge">Kubernetes 归因</span>
            <span class="badge badge-alert">流量证据</span>
          </div>
        </div>
        <div class="hero-meta">
          <article class="meta-card">
            <span>集群连接</span>
            <strong id="cluster-connection">待执行</strong>
          </article>
          <article class="meta-card">
            <span>扫描模式</span>
            <strong id="scan-mode">待执行</strong>
          </article>
          <article class="meta-card">
            <span>K8s 版本</span>
            <strong id="cluster-version">-</strong>
          </article>
          <article class="meta-card">
            <span>运行节点</span>
            <strong id="local-node-name">-</strong>
          </article>
          <article class="meta-card meta-card-wide">
            <span>最近扫描</span>
            <strong id="generated-at">-</strong>
          </article>
        </div>
      </section>

      <section id="error-banner" class="banner hidden"></section>

      <section id="stats-panel" class="stats-grid">
        <article class="stat-card panel accent-a">
          <span class="stat-label">开放端口</span>
          <strong class="stat-value" id="stat-open-count">0</strong>
        </article>
        <article class="stat-card panel accent-b">
          <span class="stat-label">流量证据</span>
          <strong class="stat-value" id="stat-traffic-count">0</strong>
        </article>
        <article class="stat-card panel accent-c">
          <span class="stat-label">暴露对象</span>
          <strong class="stat-value" id="stat-resource-count">0</strong>
        </article>
        <article class="stat-card panel accent-d">
          <span class="stat-label">宿主机地址</span>
          <strong class="stat-value" id="stat-address-count">0</strong>
        </article>
        <article class="stat-card panel accent-e">
          <span class="stat-label">记录数</span>
          <strong class="stat-value" id="stat-item-count">0</strong>
        </article>
      </section>

      <section id="filter-controls" class="controls panel">
        <div class="control-block">
          <label for="status-filter">状态</label>
          <select id="status-filter">
            <option value="all">全部</option>
            <option value="open">仅 open</option>
            <option value="closed">仅 closed</option>
            <option value="timeout">仅 timeout</option>
            <option value="unreachable">仅 unreachable</option>
            <option value="error">仅 error</option>
          </select>
        </div>
        <div class="control-block">
          <label for="type-filter">暴露类型</label>
          <select id="type-filter">
            <option value="all">全部</option>
          </select>
        </div>
        <div class="control-block search-block">
          <label for="search-input">搜索</label>
          <input id="search-input" type="search" placeholder="按节点、对象、地址或端口检索" />
        </div>
        <div class="control-block toggle-block">
          <label for="platform-toggle-button">K8s 系统组件</label>
          <button id="platform-toggle-button" type="button" aria-pressed="false">
            隐藏 K8s 系统组件：关
          </button>
        </div>
        <div class="control-block action-block">
          <label for="scan-now-button">手动刷新</label>
          <button id="scan-now-button" type="button">立即刷新</button>
          <p id="scan-state-note" class="control-note">等待状态更新</p>
        </div>
      </section>

      <section class="panel view-tabs">
        <div class="tab-list" id="view-tab-list">
          <button type="button" class="view-tab is-active" data-tab="all">
            <span>总览</span>
            <strong id="tab-count-all">0</strong>
          </button>
          <button type="button" class="view-tab" data-tab="controls">
            <span>业务治理</span>
            <strong id="tab-count-controls">0</strong>
          </button>
          <button type="button" class="view-tab" data-tab="service">
            <span>服务暴露</span>
            <strong id="tab-count-service">0</strong>
          </button>
          <button type="button" class="view-tab" data-tab="host">
            <span>Pod 映射</span>
            <strong id="tab-count-host">0</strong>
          </button>
          <button type="button" class="view-tab" data-tab="listener">
            <span>节点监听</span>
            <strong id="tab-count-listener">0</strong>
          </button>
        </div>
      </section>

      <section id="service-control-panel" class="panel service-control-panel hidden">
        <div class="section-head">
          <div>
            <p class="section-kicker">治理</p>
            <h2>业务 Service 端口治理</h2>
          </div>
          <span class="section-note" id="service-control-count-note">服务 0 个</span>
        </div>
        <div class="service-control-toolbar">
          <div class="service-control-search">
            <label for="service-control-search-input">搜索</label>
            <input
              id="service-control-search-input"
              type="search"
              placeholder="按 namespace、Service 或端口检索"
            />
          </div>
          <div class="service-control-toolbar-actions">
            <button id="service-control-refresh-button" type="button">立即刷新</button>
            <p id="service-control-scan-note" class="control-note">等待状态更新</p>
          </div>
        </div>
        <div id="service-control-list" class="service-control-list"></div>
      </section>

      <section id="exposure-sections" class="section-stack">
        <section class="panel node-panel">
          <div class="section-head">
            <div>
              <p class="section-kicker">节点</p>
              <h2>节点与地址</h2>
            </div>
            <span class="section-note" id="node-count-note">节点 0 个</span>
          </div>
          <div id="node-surface-list" class="node-surface-list"></div>
        </section>

        <section class="panel group-panel">
          <div class="section-head">
            <div>
              <p class="section-kicker">对象</p>
              <h2>归因对象</h2>
            </div>
            <span class="section-note" id="group-count-note">对象 0 个</span>
          </div>
          <div id="resource-groups" class="service-groups"></div>
        </section>

        <section class="panel table-panel">
          <details id="result-table-details" class="result-table-details" open>
            <summary class="table-summary details-summary">
              <div>
                <p class="section-kicker">明细</p>
                <h2 class="table-panel-title">暴露端口明细</h2>
              </div>
              <span class="section-note" id="table-toggle-note">0 条记录</span>
            </summary>
            <div class="table-shell">
              <table>
                <thead>
                  <tr>
                    <th>目标</th>
                    <th>归因对象</th>
                    <th>节点</th>
                    <th>状态</th>
                    <th>证据</th>
                    <th>补充</th>
                  </tr>
                </thead>
                <tbody id="result-table-body"></tbody>
              </table>
            </div>
          </details>
        </section>
      </section>
    </main>

    <template id="empty-state-template">
      <div class="empty-state">
        <h3>暂无数据</h3>
        <p>尚无记录。请等待首轮扫描完成，或调整筛选条件。</p>
      </div>
    </template>

    <script type="module" src="/app.js"></script>
  </body>
</html>
